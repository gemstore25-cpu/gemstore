version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: gemstore_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gemstore
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gemstore.sql:/docker-entrypoint-initdb.d/gemstore.sql:ro
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gemstore_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: gemstore
      PORT: 5000
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./public:/public
    ports:
      - '5000:5000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  backend_node_modules:
